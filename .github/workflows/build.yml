name: Build Windows exe

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
      - run: python -m playwright install chromium
        shell: bash
      - run: pyinstaller build_windows.spec --clean
      - run: Compress-Archive -Path dist/kuaishou-live.exe -DestinationPath dist/kuaishou-live-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: kuaishou-live-windows
          path: dist/kuaishou-live-windows.zip
          retention-days: 30
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/kuaishou-live-windows.zip
          generate_release_notes: true
